services:
  - type: web
    name: cortexpilot-api
    runtime: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r apps/orchestrator/requirements.txt && python -m pip install -e apps/orchestrator
    startCommand: PYTHONPATH=apps/orchestrator/src python -m cortexpilot_orch.cli serve --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: CORTEXPILOT_API_AUTH_REQUIRED
        value: "true"
      - key: CORTEXPILOT_API_ALLOWED_ORIGINS
        sync: false
      - key: CORTEXPILOT_API_TOKEN
        sync: false
      - key: CORTEXPILOT_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: CORTEXPILOT_RUNTIME_ROOT
        value: /var/data/cortexpilot
      - key: CORTEXPILOT_RUNS_ROOT
        value: /var/data/cortexpilot/runs
      - key: CORTEXPILOT_WORKTREE_ROOT
        value: /var/data/cortexpilot/worktrees
      - key: CORTEXPILOT_LOGS_ROOT
        value: /var/data/logs
    disk:
      name: cortexpilot-runtime
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: cortexpilot-dashboard
    runtime: node
    plan: free
    buildCommand: corepack enable pnpm && pnpm install --frozen-lockfile && pnpm --dir apps/dashboard build
    startCommand: corepack enable pnpm && pnpm --dir apps/dashboard exec next start -p $PORT -H 0.0.0.0
    envVars:
      - key: NEXT_PUBLIC_CORTEXPILOT_API_BASE
        sync: false
      - key: CORTEXPILOT_API_TOKEN
        sync: false
