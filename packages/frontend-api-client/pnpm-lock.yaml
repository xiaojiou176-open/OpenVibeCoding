lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    dependencies:
      '@cortexpilot/frontend-api-contract':
        specifier: file:../frontend-api-contract
        version: file:../frontend-api-contract

packages:

  '@cortexpilot/frontend-api-contract@file:../frontend-api-contract':
    resolution: {directory: ../frontend-api-contract, type: directory}

snapshots:

  '@cortexpilot/frontend-api-contract@file:../frontend-api-contract': {}
