  <text x="296" y="312" fill="#99F6E4" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">REVIEW EVIDENCE</text>
  <text x="492" y="312" fill="#DDD6FE" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">REPLAY SAFELY</text>
