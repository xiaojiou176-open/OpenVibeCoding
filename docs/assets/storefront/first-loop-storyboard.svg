<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">OpenVibeCoding first loop storyboard</title>
  <desc id="desc">A three-panel storyboard showing the public path from PM request to Command Tower to evidence review.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f3eb" />
      <stop offset="100%" stop-color="#dfe9ee" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffaf2" />
      <stop offset="100%" stop-color="#f4eee3" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#193041" flood-opacity="0.16" />
    </filter>
  </defs>

  <rect width="1440" height="720" fill="url(#bg)" />
  <circle cx="1260" cy="120" r="128" fill="#d07c51" opacity="0.18" />
  <circle cx="180" cy="620" r="168" fill="#28506c" opacity="0.10" />

  <text x="84" y="96" fill="#18242c" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700">First Loop Storyboard</text>
  <text x="84" y="138" fill="#50616d" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="24">
    The public story: create the task, watch the run, inspect the evidence.
  </text>

  <g filter="url(#shadow)">
    <rect x="70" y="190" rx="24" ry="24" width="390" height="440" fill="url(#panel)" stroke="#dacdbd" />
    <rect x="525" y="190" rx="24" ry="24" width="390" height="440" fill="url(#panel)" stroke="#dacdbd" />
    <rect x="980" y="190" rx="24" ry="24" width="390" height="440" fill="url(#panel)" stroke="#dacdbd" />
  </g>

  <g font-family="'Trebuchet MS', Verdana, sans-serif">
    <text x="102" y="236" fill="#7f4c2f" font-size="18" font-weight="700">Step 1</text>
    <text x="102" y="276" fill="#18242c" font-size="34" font-weight="700">PM</text>
    <text x="102" y="308" fill="#50616d" font-size="18">Write the task in one sentence.</text>
    <rect x="102" y="340" rx="16" ry="16" width="324" height="196" fill="#1c2d38" />
    <text x="128" y="376" fill="#f5f1e8" font-size="17" font-weight="700">Create task</text>
    <rect x="128" y="400" rx="10" ry="10" width="274" height="32" fill="#f5f1e8" opacity="0.08" />
    <text x="144" y="421" fill="#f5f1e8" font-size="14">Goal: investigate a topic and keep evidence</text>
    <rect x="128" y="444" rx="10" ry="10" width="274" height="32" fill="#f5f1e8" opacity="0.08" />
    <text x="144" y="465" fill="#f5f1e8" font-size="14">Acceptance: readable summary + verifiable sources</text>
    <rect x="128" y="490" rx="10" ry="10" width="140" height="26" fill="#d07c51" />
    <text x="154" y="508" fill="#fffaf2" font-size="13" font-weight="700">Start session</text>
    <text x="102" y="580" fill="#50616d" font-size="17">This is where intent becomes a governed run.</text>

    <text x="557" y="236" fill="#7f4c2f" font-size="18" font-weight="700">Step 2</text>
    <text x="557" y="276" fill="#18242c" font-size="34" font-weight="700">Command Tower</text>
    <text x="557" y="308" fill="#50616d" font-size="18">See the run move and catch blockers early.</text>
    <rect x="557" y="340" rx="16" ry="16" width="324" height="196" fill="#243f51" />
    <text x="581" y="376" fill="#f5f1e8" font-size="17" font-weight="700">Live lane</text>
    <rect x="581" y="398" rx="10" ry="10" width="276" height="30" fill="#f5f1e8" opacity="0.10" />
    <text x="596" y="418" fill="#f5f1e8" font-size="14">run_active · review_pending · evidence_waiting</text>
    <text x="581" y="460" fill="#f5f1e8" font-size="17" font-weight="700">Risk lane</text>
    <rect x="581" y="482" rx="10" ry="10" width="190" height="28" fill="#d07c51" opacity="0.92" />
    <text x="599" y="501" fill="#fffaf2" font-size="13" font-weight="700">alert: replay baseline missing</text>
    <text x="557" y="580" fill="#50616d" font-size="17">The operator should know whether the task is stuck.</text>

    <text x="1012" y="236" fill="#7f4c2f" font-size="18" font-weight="700">Step 3</text>
    <text x="1012" y="276" fill="#18242c" font-size="34" font-weight="700">Runs + Evidence</text>
    <text x="1012" y="308" fill="#50616d" font-size="18">Open the run, inspect artifacts, and replay if needed.</text>
    <rect x="1012" y="340" rx="16" ry="16" width="324" height="196" fill="#18242c" />
    <text x="1038" y="376" fill="#f5f1e8" font-size="17" font-weight="700">Evidence bundle</text>
    <rect x="1038" y="402" rx="10" ry="10" width="268" height="26" fill="#f5f1e8" opacity="0.10" />
    <text x="1056" y="420" fill="#f5f1e8" font-size="13">reports / patch.diff / artifacts / replay state</text>
    <rect x="1038" y="444" rx="10" ry="10" width="150" height="26" fill="#2d6a87" />
    <text x="1065" y="462" fill="#fffaf2" font-size="13" font-weight="700">Open run details</text>
    <rect x="1038" y="484" rx="10" ry="10" width="126" height="26" fill="#d07c51" />
    <text x="1061" y="502" fill="#fffaf2" font-size="13" font-weight="700">Replay run</text>
    <text x="1012" y="580" fill="#50616d" font-size="17">The repository earns trust when this view is inspectable.</text>
  </g>

  <g stroke="#27495e" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M461 430 C486 430, 500 430, 525 430" />
    <path d="M916 430 C941 430, 955 430, 980 430" />
  </g>
  <g fill="#27495e">
    <polygon points="517,417 539,430 517,443" />
    <polygon points="972,417 994,430 972,443" />
  </g>
</svg>
