services:
  core:
    build:
      context: ../..
      dockerfile: infra/ci/Dockerfile.core
    image: openvibecoding-ci-core:local
    init: true
    command: ["bash", "-lc", "sleep infinity"]
    tty: true
    working_dir: /workspace
    environment:
      CI: ${CI:-0}
      GITHUB_ACTIONS: ${GITHUB_ACTIONS:-false}
      GITHUB_JOB: ${GITHUB_JOB:-local}
      GITHUB_RUN_ID: ${GITHUB_RUN_ID:-0}
      GITHUB_RUN_ATTEMPT: ${GITHUB_RUN_ATTEMPT:-0}
      GITHUB_EVENT_NAME: ${GITHUB_EVENT_NAME:-local}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RUNNER_TEMP: /tmp/openvibecoding-runner-temp
      OPENVIBECODING_CI_CONTAINER: "1"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - ../..:/workspace
      - ${OPENVIBECODING_DOCKER_CI_RUNNER_TEMP_HOST:-/tmp/openvibecoding-docker-ci-runner-temp}:/tmp/openvibecoding-runner-temp
